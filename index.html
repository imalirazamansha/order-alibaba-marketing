<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ali Baba Marketing Pro | Premium Panel</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { 
            --body-bg: #0c1020;
            --glass-bg: rgba(18, 23, 45, 0.95);
            --primary: #00d2ff;
            --text-color: #ffffff;
        }
        
        body { 
            margin: 0; padding: 0; background: var(--body-bg); 
            font-family: 'Segoe UI', sans-serif; color: var(--text-color); 
            display: flex; justify-content: center; min-height: 100vh;
        }

        .glass-card { 
            background: var(--glass-bg); backdrop-filter: blur(20px); border: 2px solid rgba(255,255,255,0.1); 
            border-radius: 25px; padding: 20px; width: 92%; max-width: 420px; margin: 20px auto; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.5); box-sizing: border-box;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .rocket-icon { font-size: 50px; color: var(--primary); margin-bottom: 10px; filter: drop-shadow(0 0 10px var(--primary)); }
        
        h2 { margin: 0; font-size: 22px; font-weight: 800; color: #fff; }
        .trust-tag { font-size: 10px; opacity: 0.8; color: var(--primary); font-weight: bold; margin-top: 5px; }

        .section-title { font-size: 13px; margin: 15px 0 10px; font-weight: 600; display: flex; align-items: center; gap: 8px; color: var(--primary); }
        
        select, input { 
            width: 100%; padding: 14px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); 
            background: #161b33; color: #fff; font-size: 15px; margin-bottom: 12px; outline: none; box-sizing: border-box;
        }

        .tabs-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; margin-bottom: 15px; }
        .tab-btn { 
            background: rgba(255,255,255,0.05); padding: 12px 5px; border-radius: 10px; text-align: center; 
            cursor: pointer; border: 1px solid rgba(255,255,255,0.1); transition: 0.2s; font-size: 14px; color: #fff;
        }
        .tab-btn.active { background: var(--primary); color: #000; font-weight: bold; border-color: #fff; }

        .price-display { 
            background: rgba(0,0,0,0.3); padding: 15px; border-radius: 15px; text-align: center; 
            margin-bottom: 15px; border: 1px dashed var(--primary); 
        }
        .price-display span { font-size: 32px; font-weight: 800; color: #25D366; }

        .order-button { 
            width: 100%; background: linear-gradient(45deg, #25D366, #128C7E); color: white; border: none; 
            padding: 16px; border-radius: 15px; font-size: 17px; font-weight: bold; cursor: pointer; 
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--body-bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 999;
        }
    </style>
</head>
<body>

<div id="loading-overlay">
    <i class="fas fa-rocket fa-spin" style="font-size: 40px; color: var(--primary);"></i>
    <p style="margin-top:15px;">Updating Rates...</p>
</div>

<div class="glass-card">
    <div class="header">
        <div class="rocket-icon"><i class="fas fa-rocket"></i></div>
        <h2>Ali Baba Marketing Pro</h2>
        <div class="trust-tag">Trusted Since 2022 • 100% Safe</div>
    </div>

    <div class="section-title">Step 1: Select Platform</div>
    <select id="platformSelect" onchange="updateServices()">
        <option value="">-- Choose --</option>
    </select>

    <div id="step-service" style="display:none;">
        <div class="section-title">Step 2: Select Service</div>
        <select id="serviceSelect" onchange="updateQuantities()"></select>
    </div>

    <div id="step-quantity" style="display:none;">
        <div class="section-title">Step 3: Choose Quantity</div>
        <div class="tabs-grid" id="quantityTabs"></div>
    </div>

    <div id="step-final" style="display:none;">
        <div class="price-display">
            <small>Estimated Price</small><br>
            <span id="finalPrice">Rs 0</span>
        </div>
        <div class="section-title" id="linkText">Account/Video Link</div>
        <input type="text" id="targetLink" placeholder="Paste link here...">
        <button class="order-button" onclick="placeOrder()">
            <i class="fab fa-whatsapp"></i> Confirm via WhatsApp
        </button>
    </div>
</div>

<script>
    const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT3TljDuPoT49zJ6kgb7RzMLnT3FQojTklgx5cpjagXKGssiqP_X-ndazWnYSNddUOrgODWLiTTCEL7/pub?output=csv";
    let inventory = {};
    let currentPkg = { qty: null, price: 0 };

    async function init() {
        try {
            const response = await fetch(sheetURL);
            const data = await response.text();
            const rows = data.split('\n').slice(1);
            
            rows.forEach(row => {
                // Cleaning the data from quotes and extra spaces
                const cols = row.split(',').map(c => c.replace(/"/g, '').trim());
                if (cols.length < 4) return;
                
                const [platform, service, qty, price] = cols;

                if (!inventory[platform]) inventory[platform] = {};
                if (!inventory[platform][service]) inventory[platform][service] = {};
                inventory[platform][service][qty] = price;
            });

            const platformSelect = document.getElementById('platformSelect');
            Object.keys(inventory).forEach(p => {
                if(p) platformSelect.innerHTML += `<option value="${p}">${p}</option>`;
            });

            document.getElementById('loading-overlay').style.display = 'none';
        } catch (error) {
            console.error(error);
            alert("Connection error. Please refresh page.");
        }
    }

    function updateServices() {
        const p = document.getElementById('platformSelect').value;
        const sSelect = document.getElementById('serviceSelect');
        if (!p) return;

        sSelect.innerHTML = '<option value="">-- Select Service --</option>';
        Object.keys(inventory[p]).forEach(s => {
            sSelect.innerHTML += `<option value="${s}">${s}</option>`;
        });
        document.getElementById('step-service').style.display = 'block';
        document.getElementById('step-quantity').style.display = 'none';
        document.getElementById('step-final').style.display = 'none';
    }

    function updateQuantities() {
        const p = document.getElementById('platformSelect').value;
        const s = document.getElementById('serviceSelect').value;
        const qTabs = document.getElementById('quantityTabs');
        if (!s) return;

        qTabs.innerHTML = '';
        Object.entries(inventory[p][s]).forEach(([qty, price]) => {
            const btn = document.createElement('div');
            btn.className = 'tab-btn';
            btn.innerText = qty;
            btn.onclick = () => {
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentPkg = { qty, price };
                document.getElementById('finalPrice').innerText = "Rs " + price;
                document.getElementById('step-final').style.display = 'block';
            };
            qTabs.appendChild(btn);
        });
        document.getElementById('step-quantity').style.display = 'block';
    }

    function placeOrder() {
        const p = document.getElementById('platformSelect').value;
        const s = document.getElementById('serviceSelect').value;
        const link = document.getElementById('targetLink').value;
        if (!link) { alert("Please paste link!"); return; }

        const msg = `*NEW ORDER - Ali Baba Marketing Pro*%0A*Platform:* ${p}%0A*Service:* ${s}%0A*Quantity:* ${currentPkg.qty}%0A*Price:* Rs ${currentPkg.price}%0A*Link:* ${link}`;
        window.open(`https://wa.me/923164324778?text=${msg}`, '_blank');
    }

    init();
</script>
</body>
</html>
